name: mobile_project_app
description: "Timely - Student Helper App"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Architecture & State Management
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5

  # Network
  dio: ^5.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0 # Added for better typography

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.3.3
  http_parser: ^4.0.2
  image_picker: ^1.2.1
  cached_network_image: ^3.4.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  jwt_decoder: ^2.0.1
  local_auth: ^2.2.0
  flutter_animate: ^4.5.0
  # google_maps_flutter: ^2.14.2 # REMOVED per Enterprise Protocol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  test: ^1.24.9
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - lib/assets/
    - assets/data/
    - assets/maps/

